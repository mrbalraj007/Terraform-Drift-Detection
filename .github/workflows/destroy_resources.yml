name: Terraform Destroy (Azure)

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm resource deletion"
        required: true
        default: ""

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.0"

  # Azure OIDC (REQUIRED)
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_SKIP_PROVIDER_REGISTRATION: true

jobs:
  # -------------------------------------------------
  # JOB 1: PLAN (NO APPROVAL NEEDED)
  # -------------------------------------------------
  plan:
    name: Terraform Destroy Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ./

    steps:
      - uses: actions/checkout@v4

      - name: Validate destroy confirmation
        run: |
          [[ "${{ github.event.inputs.confirm_destroy }}" == "DESTROY" ]] || exit 1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy Plan
        run: |
          terraform plan -destroy -no-color -out=destroy.tfplan
          terraform show -no-color destroy.tfplan > destroy-plan.txt

      - uses: actions/upload-artifact@v4
        with:
          name: destroy-plan
          path: destroy-plan.txt

  # -------------------------------------------------
  # JOB 2: DESTROY (REQUIRES MANUAL APPROVAL)
  # -------------------------------------------------
  destroy:
    name: Terraform Destroy (Approved)
    needs: plan
    runs-on: ubuntu-latest

    # 🔐 MANUAL APPROVAL GATE
    environment:  dev # destroy-approval

    defaults:
      run:
        shell: bash
        working-directory: ./

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      # ---------------------------------------------
      # Slack Notification (Always)
      # ---------------------------------------------
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="✅ SUCCESS"
          [[ "${{ job.status }}" != "success" ]] && STATUS="❌ FAILED"

          curl -s -X POST -H "Content-type: application/json" \
          --data "{
            \"text\": \"$STATUS Terraform Destroy\nRepo: ${{ github.repository }}\nActor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          $SLACK_WEBHOOK_URL