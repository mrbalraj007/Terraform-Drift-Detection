name: Terraform Destroy (Azure)

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm resource deletion"
        required: true
        default: ""

env:
  TF_VERSION: "1.7.0"
  ARM_SKIP_PROVIDER_REGISTRATION: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Terraform Destroy with Safeguards
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./

    steps:
      # -------------------------------
      # Checkout
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # Destroy confirmation
      # -------------------------------
      - name: Validate destroy confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "❌ Destroy not confirmed. Type DESTROY to proceed."
            exit 1
          fi

      # -------------------------------
      # Terraform setup
      # -------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # -------------------------------
      # Azure Login (OIDC)
      # -------------------------------
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -------------------------------
      # Terraform Init
      # -------------------------------
      - name: Terraform Init
        run: terraform init -input=false

      # ==========================================================
      # 1️⃣ PRE-DESTROY REVIEW MODE (PLAN)
      # ==========================================================
      - name: Terraform Destroy Plan (Review Mode)
        id: destroy_plan
        run: |
          terraform plan -destroy -no-color -out=destroy.tfplan
          terraform show -no-color destroy.tfplan > destroy-plan.txt

      - name: Upload Destroy Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-destroy-plan
          path: destroy-plan.txt

      # ==========================================================
      # 2️⃣ AZURE TAG VALIDATION
      # ==========================================================
      - name: Validate Azure Tags
        run: |
          echo "🔍 Validating Azure resource tags..."

          REQUIRED_TAGS=("Environment" "Owner" "CostCenter")

          RESOURCES=$(az resource list --query "[].id" -o tsv)

          for RESOURCE in $RESOURCES; do
            TAGS=$(az resource show --ids "$RESOURCE" --query "tags" -o json)

            for TAG in "${REQUIRED_TAGS[@]}"; do
              if ! echo "$TAGS" | grep -q "$TAG"; then
                echo "❌ Resource missing required tag '$TAG': $RESOURCE"
                exit 1
              fi
            done
          done

          echo "✅ All resources have required tags."

      # ==========================================================
      # 3️⃣ TERRAFORM DESTROY
      # ==========================================================
      - name: Terraform Destroy
        id: destroy
        run: terraform destroy -auto-approve

      # ==========================================================
      # 4️⃣ SLACK NOTIFICATION
      # ==========================================================
      - name: Notify Slack (Success)
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MESSAGE="✅ *Terraform Destroy Completed Successfully*\n\
          Repository: ${{ github.repository }}\n\
          Branch: ${{ github.ref_name }}\n\
          Triggered by: ${{ github.actor }}\n\
          Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"$MESSAGE\"}" \
            $SLACK_WEBHOOK_URL

      - name: Notify Slack (Failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MESSAGE="❌ *Terraform Destroy Failed*\n\
          Repository: ${{ github.repository }}\n\
          Branch: ${{ github.ref_name }}\n\
          Triggered by: ${{ github.actor }}\n\
          Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"$MESSAGE\"}" \
            $SLACK_WEBHOOK_URL