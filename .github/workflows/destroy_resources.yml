name: Terraform Destroy (Azure)

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm resource deletion"
        required: true
        default: ""

env:
  TF_VERSION: "1.7.0"

  # --- Azure OIDC (CRITICAL FIX) ---
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_SKIP_PROVIDER_REGISTRATION: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Terraform Destroy with Safeguards
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./

    steps:
      # -----------------------------------
      # Checkout
      # -----------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------
      # Destroy confirmation
      # -----------------------------------
      - name: Validate destroy confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "❌ Destroy not confirmed. Type DESTROY to proceed."
            exit 1
          fi

      # -----------------------------------
      # Terraform setup
      # -----------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # -----------------------------------
      # Azure Login (OIDC)
      # -----------------------------------
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------
      # Terraform Init
      # -----------------------------------
      - name: Terraform Init
        run: terraform init -input=false

      # ===================================
      # 1️⃣ PRE-DESTROY PLAN (REVIEW MODE)
      # ===================================
      - name: Terraform Destroy Plan
        run: |
          terraform plan -destroy -no-color -out=destroy.tfplan
          terraform show -no-color destroy.tfplan > destroy-plan.txt

      - name: Upload Destroy Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-destroy-plan
          path: destroy-plan.txt

      # ===================================
      # 2️⃣ AZURE TAG VALIDATION
      # ===================================
      - name: Validate Azure Resource Tags
        run: |
          echo "🔍 Validating Azure resource tags..."

          REQUIRED_TAGS=("Environment" "Owner" "CostCenter")
          RESOURCES=$(az resource list --query "[].id" -o tsv)

          for RESOURCE in $RESOURCES; do
            TAGS=$(az resource show --ids "$RESOURCE" --query "tags" -o json)

            for TAG in "${REQUIRED_TAGS[@]}"; do
              if ! echo "$TAGS" | grep -q "$TAG"; then
                echo "❌ Resource missing tag '$TAG': $RESOURCE"
                exit 1
              fi
            done
          done

          echo "✅ All required tags are present."

      # ===================================
      # 3️⃣ TERRAFORM DESTROY
      # ===================================
      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      # ===================================
      # 4️⃣ SLACK NOTIFICATIONS
      # ===================================
      - name: Notify Slack (Success)
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data "{\"text\":\"✅ *Terraform Destroy Successful*\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nActor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          $SLACK_WEBHOOK_URL

      - name: Notify Slack (Failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data "{\"text\":\"❌ *Terraform Destroy Failed*\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nActor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          $SLACK_WEBHOOK_URL
``