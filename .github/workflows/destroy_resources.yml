# ==============================================================================
# Terraform Destroy Workflow (Azure OIDC) — Single-file DRY
#
# DRY approach: both plan and destroy run in ONE job on ONE runner.
# This eliminates all duplicated steps (checkout, setup-terraform,
# azure-login, terraform-init) since each runs exactly once.
#
# Safety gates (two layers, same as the two-job version):
#   1. workflow_dispatch input  → user must type DESTROY to proceed
#   2. environment: dev         → Required Reviewers approval in GitHub UI
#
# Secret placement summary
# ─────────────────────────────────────────────────────────────────────────────
# GitHub Environment : dev
#   • AZURE_CLIENT_ID
#   • AZURE_SUBSCRIPTION_ID
#   • AZURE_TENANT_ID
#   • BACKEND_AZURE_RESOURCE_GROUP_NAME
#   • BACKEND_AZURE_STORAGE_ACCOUNT_NAME
#   • BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME
#
# GitHub Repository  : (Settings → Secrets and variables → Actions)
#   • SLACK_WEBHOOK_URL
# ==============================================================================

name: Terraform Destroy (Azure)

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm resource deletion"
        required: true
        default: ""

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

env:
  TF_VERSION: "1.7.0"

  # ── Azure OIDC authentication ───────────────────────────────────────────────
  ARM_USE_OIDC:                   "true"
  ARM_CLIENT_ID:                  ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:                  ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID:            ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_SKIP_PROVIDER_REGISTRATION: "true"

  # ── Terraform remote-state backend ─────────────────────────────────────────
  BACKEND_RG:        ${{ secrets.BACKEND_AZURE_RESOURCE_GROUP_NAME }}
  BACKEND_SA:        ${{ secrets.BACKEND_AZURE_STORAGE_ACCOUNT_NAME }}
  BACKEND_CONTAINER: ${{ secrets.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME }}

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  destroy:
    name: "💣 Terraform Destroy Plan + Apply"
    runs-on: ubuntu-latest
    environment: dev   # ← Required Reviewers approval gate (configure in
                       #   GitHub → Settings → Environments → dev)
    defaults:
      run:
        shell: bash
        working-directory: ./

    steps:
      # ── Gate 1: typed confirmation ──────────────────────────────────────────
      - name: Validate destroy confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]]; then
            echo "❌ Confirmation input does not equal DESTROY. Aborting."
            exit 1
          fi
          echo "✅ Destroy confirmed."

      # ── Setup (runs once — no duplication) ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ env.BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_SA }}" \
            -backend-config="container_name=${{ env.BACKEND_CONTAINER }}"

      # ── Plan ────────────────────────────────────────────────────────────────
      - name: Terraform Destroy Plan
        run: |
          terraform plan -destroy \
            -no-color \
            -input=false \
            -out=destroy.tfplan
          terraform show -no-color destroy.tfplan > destroy-plan.txt

      - name: Upload destroy plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan
          path: destroy-plan.txt

      # ── Apply ───────────────────────────────────────────────────────────────
      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

      # ── Notify (always runs, even on failure) ───────────────────────────────
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            STATUS="✅ SUCCESS"
          else
            STATUS="❌ FAILED"
          fi

          curl -s -X POST \
            -H "Content-type: application/json" \
            --data "{
              \"text\": \"$STATUS — Terraform Destroy\nRepo:  ${{ github.repository }}\nActor: ${{ github.actor }}\nRun:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            "$SLACK_WEBHOOK_URL"