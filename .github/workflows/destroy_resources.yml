name: Terraform Destroy (Azure)

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm resource deletion"
        required: true
        default: ""

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.0"

  # --- Azure OIDC (REQUIRED for Terraform) ---
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_SKIP_PROVIDER_REGISTRATION: true

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ./

    steps:
      # -------------------------------------------------
      # Checkout
      # -------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Safety confirmation
      # -------------------------------------------------
      - name: Validate destroy confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]]; then
            echo "❌ Destroy not confirmed. Aborting."
            exit 1
          fi

      # -------------------------------------------------
      # Terraform
      # -------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # -------------------------------------------------
      # Azure Login (OIDC)
      # -------------------------------------------------
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -------------------------------------------------
      # Terraform Init
      # -------------------------------------------------
      - name: Terraform Init
        run: terraform init -input=false

      # -------------------------------------------------
      # PRE-DESTROY PLAN (REVIEW MODE)
      # -------------------------------------------------
      - name: Terraform Destroy Plan
        run: |
          terraform plan -destroy -no-color -out=destroy.tfplan
          terraform show -no-color destroy.tfplan > destroy-plan.txt

      - name: Upload Destroy Plan
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan
          path: destroy-plan.txt

      # -------------------------------------------------
      # AZURE TAG VALIDATION (SAFE + SIMPLE)
      # -------------------------------------------------
      - name: Validate Azure Tags
        run: |
          REQUIRED_TAGS="Environment Owner"
          RESOURCE_IDS=$(az resource list --query "[].id" -o tsv)

          for ID in $RESOURCE_IDS; do
            TAGS=$(az resource show --ids "$ID" --query "tags" -o json)
            for TAG in $REQUIRED_TAGS; do
              if ! echo "$TAGS" | grep -q "\"$TAG\""; then
                echo "❌ Resource missing tag '$TAG': $ID"
                exit 1
              fi
            done
          done

          echo "✅ Tag validation passed"

      # -------------------------------------------------
      # TERRAFORM DESTROY
      # -------------------------------------------------
      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      # -------------------------------------------------
      # SLACK NOTIFICATION (ALWAYS RUNS)
      # -------------------------------------------------
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            STATUS="✅ SUCCESS"
          else
            STATUS="❌ FAILED"
          fi

          curl -s -X POST -H "Content-type: application/json" \
            --data "{
              \"text\": \"$STATUS Terraform Destroy\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nActor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            $SLACK_WEBHOOK_URL