name: '[CI] Terraform - Format, Validate & Security Scan'

############################################################
# Trigger:
# - On push (excluding main branch)
# - Only runs if commit message contains [CI]
# - Manual trigger supported
############################################################

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

############################################################
# Global Environment Variables
############################################################
env:
  TF_LOG: INFO
  TF_INPUT: false

############################################################
# Permissions (Required for OIDC)
############################################################
permissions:
  id-token: write
  contents: read
  pull-requests: write

############################################################
# JOB
############################################################
jobs:
  terraform-analysis:
    name: 'Terraform Format, Validate, Plan & Scan'
    runs-on: ubuntu-latest

    ########################################################
    # Condition:
    # Run only if commit message contains [CI]
    # OR manual trigger
    ########################################################
    if: contains(github.event.head_commit.message, '[CI]') || github.event_name == 'workflow_dispatch'

    ########################################################
    # Environment Variables (Azure OIDC)
    ########################################################
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true

      # Backend config
      RESOURCE_GROUP: ${{ secrets.BACKEND_AZURE_RESOURCE_GROUP_NAME }}
      STORAGE_ACCOUNT: ${{ secrets.BACKEND_AZURE_STORAGE_ACCOUNT_NAME }}
      CONTAINER_NAME: ${{ secrets.BACKEND_AZURE_STORAGE_ACCOUNT_CONTAINER_NAME }}

    defaults:
      run:
        shell: bash
        working-directory: ./

    ########################################################
    # STEPS
    ########################################################
    steps:

    # Checkout Code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ secrets.TERRAFORM_VERSION }}

    ########################################################
    # Terraform Init (with Azure Backend)
    ########################################################
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="storage_account_name=$STORAGE_ACCOUNT" \
          -backend-config="container_name=$CONTAINER_NAME" \
          -backend-config="resource_group_name=$RESOURCE_GROUP"

    ########################################################
    # Terraform Format
    ########################################################
    - name: Terraform Format
      run: terraform fmt -check -diff -recursive
      continue-on-error: true

    ########################################################
    # Terraform Validate
    ########################################################
    - name: Terraform Validate
      run: terraform validate -no-color

    ########################################################
    # Terraform Plan
    ########################################################
    - name: Terraform Plan
      run: terraform plan -no-color -input=false -out=tfplan.out

    ########################################################
    # Terraform Compliance
    ########################################################
    - name: Terraform Compliance Scan
      uses: terraform-compliance/github_action@0.3.0
      with:
        plan: tfplan.out

    ########################################################
    # Checkov Security Scan
    ########################################################
    - name: Checkov Scan
      uses: bridgecrewio/checkov-action@v12
      with:
        framework: terraform
        quiet: true
        output_format: github_failed_only
        log_level: INFO
        soft_fail: false
        container_user: 1000
        skip_check: CKV_TF_1,CKV_AZURE_88,CKV_AZURE_71,CKV_AZURE_16,CKV_AZURE_80,CKV_AZURE_63,CKV_AZURE_18,CKV_AZURE_65,CKV_AZURE_17,CKV_AZURE_13,CKV_AZURE_78,CKV_AZURE_66,CKV_AZURE_44,CKV_AZURE_35,CKV_AZURE_43,CKV_AZURE_33,CKV_AZURE_3,CKV2_AZURE_1,CKV2_AZURE_18,CKV2_AZURE_8,CKV2_AZURE_21,CKV_GIT_4