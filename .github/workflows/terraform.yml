name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.7.0"

# ✅ CRITICAL — Must have these permissions for OIDC to work
permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
      # ------- Step 1: Checkout Code -------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------- Step 2: ✅ OIDC Login — THIS WAS MISSING -------
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ------- Step 3: Setup Terraform -------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ------- Step 4: Terraform Init -------
      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}       # ✅ No CLIENT_SECRET
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_USE_OIDC:        "true"                                # ✅ KEY FLAG

      # ------- Step 5: Terraform Format -------
      - name: Terraform Format
        run: terraform fmt -check

      # ------- Step 6: Terraform Validate -------
      - name: Terraform Validate
        run: terraform validate
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_USE_OIDC:        "true"

      # ------- Step 7: Terraform Plan -------
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_USE_OIDC:        "true"

      # ------- Step 8: Upload Plan -------
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

      # ------- Step 9: Terraform Apply (main branch only) -------
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_USE_OIDC:        "true"